name: Update Funding Radar
on:
  schedule:
    - cron: '0 9 * * 1'  # Mondays 9 AM UTC
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4
      
      - name: Run funding radar update
        run: |
          # Placeholder for actual scraping
          echo "Funding radar would update here"
      
      - name: Commit and push
        run: |
          git config user.name "Funding Radar Bot"
          git config user.email "radar@tiagobarros-research.com"
          git add funding-radar/
          git commit -m "Auto-update: Funding radar $(date +%Y-%m-%d)" || true
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
